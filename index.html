<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <link rel="icon" href="logo.png">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blueimp-md5/js/md5.min.js"></script>
    <script src="onload.js"></script>
    <title>Last.FM Radio</title>

    <link rel="stylesheet" href="index.css">

</head>
<body>
    <header>
        <h1>Last.FM Radio</h1>
        <div>
            <button type="button" class="btn btn-danger" id="auth-button">Authenticate</button>
            <button type="button" class="btn btn-secondary" id="settings-button" data-bs-toggle="modal" data-bs-target="#settings-modal">Settings</button>
        </div>
    </header>

    <div class="modal fade" id="settings-modal" tabindex="-1" aria-labelledby="settings-modal-label" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="settings-modal-label">API Settings</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" style="text-align:left;">
                    <p>You need a <a href="https://www.last.fm/api/account/create" target="_blank" style="color:#bb2222;">Last.FM API account</a> and a <a href="https://developers.google.com/youtube/v3/getting-started" target="_blank" style="color:#bb2222;">YouTube Data API v3 key</a>.</p>
                    <label for="setting-lastfm-key">Last.FM API Key</label>
                    <div class="api-key-field">
                        <input type="password" id="setting-lastfm-key" placeholder="e.g. a1b2c3d4e5f6..." autocomplete="off">
                        <button type="button" class="eye-toggle" aria-label="Toggle visibility" data-target="setting-lastfm-key"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m644-428-58-58q9-47-27-88t-93-32l-58-58q17-8 34.5-12t37.5-4q75 0 127.5 52.5T660-500q0 20-4 37.5T644-428Zm128 126-58-56q38-29 67.5-63.5T832-500q-50-101-143.5-160.5T480-720q-29 0-57 4t-55 12l-62-62q41-17 84-25.5t90-8.5q151 0 269 83.5T920-500q-23 59-60.5 109.5T772-302Zm20 246L624-222q-35 11-70.5 16.5T480-200q-151 0-269-83.5T40-500q21-53 53-98.5t73-81.5L56-792l56-56 736 736-56 56ZM222-624q-29 26-53 57t-41 67q50 101 143.5 160.5T480-280q20 0 39-2.5t39-5.5l-36-38q-11 3-21 4.5t-21 1.5q-75 0-127.5-52.5T300-500q0-11 1.5-21t4.5-21l-84-82Zm319 93Zm-151 75Z"/></svg></button>
                    </div>
                    <label for="setting-lastfm-secret">Last.FM Secret</label>
                    <div class="api-key-field">
                        <input type="password" id="setting-lastfm-secret" placeholder="e.g. a1b2c3d4e5f6..." autocomplete="off">
                        <button type="button" class="eye-toggle" aria-label="Toggle visibility" data-target="setting-lastfm-secret"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m644-428-58-58q9-47-27-88t-93-32l-58-58q17-8 34.5-12t37.5-4q75 0 127.5 52.5T660-500q0 20-4 37.5T644-428Zm128 126-58-56q38-29 67.5-63.5T832-500q-50-101-143.5-160.5T480-720q-29 0-57 4t-55 12l-62-62q41-17 84-25.5t90-8.5q151 0 269 83.5T920-500q-23 59-60.5 109.5T772-302Zm20 246L624-222q-35 11-70.5 16.5T480-200q-151 0-269-83.5T40-500q21-53 53-98.5t73-81.5L56-792l56-56 736 736-56 56ZM222-624q-29 26-53 57t-41 67q50 101 143.5 160.5T480-280q20 0 39-2.5t39-5.5l-36-38q-11 3-21 4.5t-21 1.5q-75 0-127.5-52.5T300-500q0-11 1.5-21t4.5-21l-84-82Zm319 93Zm-151 75Z"/></svg></button>
                    </div>
                    <label for="setting-youtube-key">YouTube API Key</label>
                    <div class="api-key-field">
                        <input type="password" id="setting-youtube-key" placeholder="e.g. AIzaSy..." autocomplete="off">
                        <button type="button" class="eye-toggle" aria-label="Toggle visibility" data-target="setting-youtube-key"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m644-428-58-58q9-47-27-88t-93-32l-58-58q17-8 34.5-12t37.5-4q75 0 127.5 52.5T660-500q0 20-4 37.5T644-428Zm128 126-58-56q38-29 67.5-63.5T832-500q-50-101-143.5-160.5T480-720q-29 0-57 4t-55 12l-62-62q41-17 84-25.5t90-8.5q151 0 269 83.5T920-500q-23 59-60.5 109.5T772-302Zm20 246L624-222q-35 11-70.5 16.5T480-200q-151 0-269-83.5T40-500q21-53 53-98.5t73-81.5L56-792l56-56 736 736-56 56ZM222-624q-29 26-53 57t-41 67q50 101 143.5 160.5T480-280q20 0 39-2.5t39-5.5l-36-38q-11 3-21 4.5t-21 1.5q-75 0-127.5-52.5T300-500q0-11 1.5-21t4.5-21l-84-82Zm319 93Zm-151 75Z"/></svg></button>
                    </div>
                    <hr style="border-color:#444; margin-top:16px;">
                    <p style="margin-bottom:8px;">Song cache</p>
                    <div style="display:flex; gap:8px;">
                        <button type="button" class="btn btn-secondary btn-sm" id="export-cache-button">Export</button>
                        <button type="button" class="btn btn-secondary btn-sm" id="import-cache-button">Import</button>
                        <input type="file" id="import-cache-input" accept=".json" style="display:none;">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" id="save-settings-button">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div id="setup-notice" style="display:none;">
        &#9888; API keys not configured. Click <strong>Settings</strong> to get started.
    </div>

    <div id="form-container">
        <form id="options">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Last.FM username">
            <label for="min-plays">Minimum Plays</label>
            <input type="number" id="min-plays" name="min-plays" min="1" value="10">
            <label for="min-plays">Maximum Plays</label>
            <input type="number" id="max-plays" name="max-plays" min="1" value="10000">
            <label for="period">Time Period</label>
            <select id="period">
                <option>Last 7 Days</option>
                <option>Last Month</option>
                <option>Last 3 Months</option>
                <option>Last 6 Months</option>
                <option>Last Year</option>
                <option selected>Overall</option>
            </select>
            <label for="order">Playlist Order</label>
            <select id="order">
                <option selected>Random</option>
                <option>In Order</option>
            </select>
            <button type="button" class="btn btn-danger" id="play-button">Play Library</button>
        </form>
    </div>

    <div id="content">
        <div id="title-row">
            <h2 id="song-title"></h2>
        </div>
        <div id="edit-video-row" style="display:none;">
            <input type="text" id="edit-video-input" placeholder="YouTube video ID or URL">
            <button type="button" class="btn btn-danger btn-sm" id="edit-video-confirm">Apply</button>
            <button type="button" class="btn btn-secondary btn-sm" id="edit-video-cancel">Cancel</button>
        </div>
        <div id="player-wrapper">
            <div id="player"></div>
        </div>
        <div id="controls">
            <div id="editing">
                <button type="button" class="btn btn-secondary" id="edit-video-button" title="Fix YouTube video">&#9998;</button>
            </div>
            <div id="seeking">
                <button type="button" class="btn btn-secondary" id="prev-button" title="Go to previous track">&laquo; Previous</button>
                <button type="button" class="btn btn-secondary" id="scrobble-button"  title="Scrobble and go to next track">&#9835;</button>
                <button type="button" class="btn btn-secondary" id="skip-button"  title="Go to next track">Next &raquo;</button>
            </div>
            <div id="looping">
                <button type="button" class="btn btn-secondary" id="loop-button"  title="Loop the current track">&#10227;</button>
            </div>
        </div>
    </div>
    <button type="button" id="home-button" title="Back to track selection" onclick="location.reload()">⌂</button>
    <script src="index.js"></script>
</body>
</html>
